<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#4F46E5"/>

  <!-- Scooter body -->
  <ellipse cx="32" cy="34" rx="14" ry="6" fill="white" opacity="0.15"/>

  <!-- Rear wheel -->
  <circle cx="20" cy="40" r="7" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="20" cy="40" r="2" fill="white"/>

  <!-- Front wheel -->
  <circle cx="46" cy="40" r="7" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="46" cy="40" r="2" fill="white"/>

  <!-- Body frame -->
  <path d="M20 40 L27 28 L38 28 L46 40" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Seat -->
  <rect x="27" y="24" width="12" height="5" rx="2.5" fill="white"/>

  <!-- Handlebar -->
  <path d="M42 28 L48 24" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Rider helmet hint -->
  <circle cx="35" cy="20" r="5" fill="white" opacity="0.9"/>
  <path d="M30 20 Q35 14 40 20" fill="white" opacity="0.9"/>
</svg>
